# Embedding Layer runs on port 8082
server.port=8082

# PostgreSQL — same DB as Ingestion Layer, reads PENDING chunks
spring.datasource.url=jdbc:postgresql://localhost:5432/seekb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Ollama embedding endpoint
ollama.base-url=http://localhost:11434

# Local FAISS flat index file path
faiss.index.path=/tmp/seekb_faiss.index
