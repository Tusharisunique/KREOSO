<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SE-EKB | Interact</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>BRAIN INTERACTION</h1>
        <a th:href="@{/logout}" class="btn btn-secondary">TERMINATE</a>
    </header>

    <div class="container" style="display: flex; flex-direction: column; height: 70vh;">
        <div id="chatHistory" class="chat-container" style="flex: 1; overflow-y: auto; padding-right: 1rem;">
            <div class="message ai">
                SYSTEM READY. PROVIDE QUERY TO INITIATE KNOWLEDGE RETRIEVAL.
            </div>
        </div>

        <div style="margin-top: 2rem;">
            <form id="chatForm">
                <div class="form-group">
                    <input type="text" id="userInput" placeholder="ENTER QUERY..." required autocomplete="off">
                </div>
                <button type="submit" class="btn" id="sendBtn">EXECUTE</button>
            </form>
        </div>
    </div>

    <footer>
        Self-Evolving Enterprise Knowledge Brain v1.0.0
    </footer>

    <script th:inline="javascript">
        const chatHistory = document.getElementById('chatHistory');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            // Add User Message
            addMessage(text, 'user');
            userInput.value = '';
            
            // Add Loading State
            const loadingMsg = addMessage('PROCESSING...', 'ai');
            
            try {
                const response = await fetch('/chat/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: text })
                });
                
                const data = await response.json();
                
                // Update AI Message: Just the clean answer
                loadingMsg.innerHTML = `<div class="answer-text">${data.answer}</div>`;
                
                // --- Metadata & Warnings (Now strictly BELOW the answer) ---
                
                // 1. Low Confidence Warning
                if (data.confidence !== undefined && data.confidence < 70) {
                    const warn = document.createElement('div');
                    warn.className = 'confidence-warning';
                    warn.style.marginTop = '1rem';
                    warn.innerText = '⚠ LOW CONFIDENCE ALERT - VERIFY WITH SYSTEM ADMIN';
                    loadingMsg.appendChild(warn);
                }

                // 2. Confidence & Sources Pill
                const metaDiv = document.createElement('div');
                metaDiv.className = 'message-metadata';

                if (data.confidence !== undefined) {
                    const confBadge = document.createElement('span');
                    confBadge.className = 'conf-badge ' + (data.confidence < 70 ? 'low' : 'high');
                    confBadge.innerText = 'CONFIDENCE: ' + data.confidence + '%';
                    metaDiv.appendChild(confBadge);
                }

                if (data.sources && data.sources.length > 0) {
                    const sourcesSpan = document.createElement('span');
                    sourcesSpan.className = 'sources-list';
                    sourcesSpan.innerText = ' | SOURCES: ' + data.sources.join(', ');
                    metaDiv.appendChild(sourcesSpan);
                }
                
                loadingMsg.appendChild(metaDiv);

                // 3. Feedback Layer UI
                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback-actions';
                feedbackDiv.innerHTML = `
                    <button onclick="sendFeedback('${text.replace(/'/g, "\\'")}', '${data.answer.replace(/'/g, "\\'")}', 1, ${data.confidence || 100}, this)">👍</button>
                    <button onclick="sendFeedback('${text.replace(/'/g, "\\'")}', '${data.answer.replace(/'/g, "\\'")}', -1, ${data.confidence || 100}, this)">👎</button>
                `;
                loadingMsg.appendChild(feedbackDiv);

            } catch (err) {
                loadingMsg.innerText = 'COMMUNICATION ERROR: ' + err.message;
            }
            
            scrollToBottom();
        });

        async function sendFeedback(q, a, r, c, btn) {
            try {
                await fetch('/chat/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: q, answer: a, rating: r, confidence: c })
                });
                btn.parentElement.innerHTML = '<span style="font-size: 0.8rem; opacity: 0.6;">FEEDBACK RECORDED</span>';
            } catch (err) {
                console.error('Feedback failed', err);
            }
        }

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.innerText = text;
            chatHistory.appendChild(div);
            scrollToBottom();
            return div;
        }

        function scrollToBottom() {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    </script>
</body>
</html>
