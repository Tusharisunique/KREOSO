# Ingestion Layer runs on port 8081
server.port=8081

# PostgreSQL connection — update credentials before running
spring.datasource.url=jdbc:postgresql://localhost:5432/seekb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — auto-create tables on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Ollama base URL (used by Embedding Layer, kept here for reference)
ollama.base-url=http://localhost:11434

# FAISS index file path (used by Embedding Layer)
faiss.index.path=/tmp/seekb_faiss.index

# Max file upload size
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
